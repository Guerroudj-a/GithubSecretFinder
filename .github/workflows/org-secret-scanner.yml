name: GitHub Secret Exposure Scanner

on:
  workflow_dispatch:
    inputs:
      target_type:
        description: "org OR user"
        required: true
        default: "org"

      target_name:
        description: "Organization name OR username"
        required: true

      repository:
        description: "Optional: scan single repo only"
        required: false

      include_members:
        description: "Scan organization members repos too"
        required: true
        default: "false"

      scan_history:
        description: "Scan commit history"
        required: true
        default: "true"

      scan_branches:
        description: "Scan all branches"
        required: true
        default: "true"

jobs:
  scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests GitPython tqdm

      - name: Run scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_TYPE: ${{ github.event.inputs.target_type }}
          TARGET_NAME: ${{ github.event.inputs.target_name }}
          REPO_NAME: ${{ github.event.inputs.repository }}
          INCLUDE_MEMBERS: ${{ github.event.inputs.include_members }}
          SCAN_HISTORY: ${{ github.event.inputs.scan_history }}
          SCAN_BRANCHES: ${{ github.event.inputs.scan_branches }}
        run: python scanner.py
